<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Lovely Interactive Experience</title>
    <style>
        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevents scrollbars from particles */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Hints that the user can click */
        }

        /* Animated Gradient Background */
        body {
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            padding: 3rem;
            text-align: center;
            color: #4a4a4a;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 80%;
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.25);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            color: #333;
        }

        p {
            margin: 0;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Interactive Particles */
        .particle {
            position: absolute;
            pointer-events: none; /* Lets clicks pass through to the background */
            font-size: 24px;
            user-select: none;
            animation: floatAway 1.5s ease-out forwards;
        }

        @keyframes floatAway {
            0% { 
                transform: translate(-50%, -50%) scale(0.5); 
                opacity: 1; 
            }
            100% { 
                /* var(--drift) is set by JavaScript for random left/right movement */
                transform: translate(calc(-50% + var(--drift)), -120px) scale(1.5) rotate(20deg); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Hello, Beautiful! ✨</h1>
        <p>Move your mouse around, and click anywhere.</p>
    </div>

    <script>
        // Array of lovely emojis to use as particles
        const emojis = ['💖', '✨', '🌸', '🦋', '💫', '🌷'];

        // Function to create a single particle
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Pick a random emoji
            particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Set starting position to the mouse coordinates
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            // Give it a random horizontal drift for a natural floating effect
            const drift = (Math.random() - 0.5) * 100; // Random number between -50 and 50
            particle.style.setProperty('--drift', `${drift}px`);
            
            document.body.appendChild(particle);

            // Remove the particle from the HTML after the CSS animation finishes (1500ms)
            setTimeout(() => {
                particle.remove();
            }, 1500);
        }

        // Mouse move event: leaves a trail of magic!
        document.addEventListener('mousemove', function(e) {
            // Only trigger 15% of the time to prevent lagging and overcrowding
            if (Math.random() > 0.85) { 
                createParticle(e.clientX, e.clientY);
            }
        });

        // Click event: creates a little burst of magic!
        document.addEventListener('click', function(e) {
            // Create 6 particles rapidly
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    createParticle(e.clientX, e.clientY);
                }, i * 40); // Stagger them slightly
            }
        });

        // Touch support for mobile devices
        document.addEventListener('touchmove', function(e) {
            if (Math.random() > 0.7) { 
                createParticle(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
    </script>
</body>
</html>
