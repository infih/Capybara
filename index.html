<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For the Lovely Prapti 🍑</title>
    <!-- Importing cute and elegant fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Cursors */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* We will use a custom cute cursor */
        }

        body, html {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            /* Gorgeous Animated Peach Gradient */
            background: linear-gradient(-45deg, #ffc3a0, #ffafbd, #ffc3a0, #ffecd2);
            background-size: 400% 400%;
            animation: peachyBreeze 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        @keyframes peachyBreeze {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Custom Sparkle Cursor */
        #cute-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px 5px rgba(255, 143, 143, 0.8), 0 0 30px 10px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s;
        }

        /* High-Performance Canvas for Interactivity */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 3D Floating Glass Card */
        .card-container {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .cute-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            padding: 3rem 4rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 120, 120, 0.2), 
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            color: #d65a7b;
            max-width: 500px;
            transform: translateZ(50px);
            transition: transform 0.2s ease-out;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 10px rgba(255, 117, 140, 0.3);
            line-height: 1.2;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 600;
            color: #b05c6f;
        }

        /* Interactive Cute Button */
        .magic-btn {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .magic-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 15px 30px rgba(255, 154, 158, 0.8);
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
        }

        .magic-btn:active {
            transform: translateY(2px) scale(0.95);
        }

        /* Hidden Cute Message */
        .secret-message {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s ease-in-out;
            font-size: 1.2rem;
            font-weight: 800;
            color: #ff6b81;
            margin-top: 0;
        }

        .secret-message.reveal {
            max-height: 200px;
            opacity: 1;
            margin-top: 25px;
        }

    </style>
</head>
<body>

    <!-- Cute Glowing Cursor -->
    <div id="cute-cursor"></div>

    <!-- The Interactive Physics Canvas -->
    <canvas id="canvas"></canvas>

    <!-- The Floating Card -->
    <div class="card-container" id="cardBox">
        <div class="cute-card" id="tiltCard">
            <h1>Prapti</h1>
            <p>You make the world as sweet and warm as a perfect peach. Move your spark around and click for a surprise!</p>
            <button class="magic-btn" id="btn">Click Me 🍑</button>
            <div class="secret-message" id="msg">
                You are absolutely beautiful inside and out, Prapti! Keep shining your lovely light everywhere you go. ✨💖
            </div>
        </div>
    </div>

    <script>
        /* --- 1. Cute Custom Cursor Logic --- */
        const cursor = document.getElementById('cute-cursor');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(2)';
            cursor.style.background = '#ff758c';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            cursor.style.background = '#fff';
        });

        /* --- 2. 3D Card Hover Tilt --- */
        const cardBox = document.getElementById('cardBox');
        const tiltCard = document.getElementById('tiltCard');
        
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            tiltCard.style.transform = `translateZ(50px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        /* --- 3. Button Interaction --- */
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');

        btn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stop background click explosion from firing here
            msg.classList.toggle('reveal');
            
            if (msg.classList.contains('reveal')) {
                btn.innerText = "So Beautiful! ✨";
                createExplosion(window.innerWidth / 2, window.innerHeight / 2, 80, true); // Big peach explosion!
            } else {
                btn.innerText = "Click Me 🍑";
            }
        });

        /* --- 4. Bouncy Canvas Physics Engine --- */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // Adorable array of items for the particles
        const cuteItems = ['🍑', '💖', '✨', '🌸', '🎀', '⭐'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, isExplosion = false, isSuper = false) {
                this.x = x;
                this.y = y;
                this.item = cuteItems[Math.floor(Math.random() * cuteItems.length)];
                this.size = Math.random() * 20 + 15;
                
                if (isSuper) this.size *= 1.5; // Bigger items for the button click
                
                if (isExplosion) {
                    // Explosive physics with gravity
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * (isSuper ? 25 : 15) + 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.5; // Pulls them down
                    this.life = 1;
                    this.decay = Math.random() * 0.01 + 0.005;
                    this.bounciness = Math.random() * 0.4 + 0.4; // How bouncy they are
                } else {
                    // Magic trail physics (floating up)
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2 - 1;
                    this.gravity = -0.05; // Float up
                    this.life = 1;
                    this.decay = Math.random() * 0.04 + 0.02;
                    this.bounciness = 0;
                }
                
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 15;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                this.life -= this.decay;

                // Bounce off the bottom of the screen!
                if (this.y > height - this.size && this.bounciness > 0) {
                    this.y = height - this.size;
                    this.vy *= -this.bounciness; // Reverse velocity and reduce it
                    this.vx *= 0.8; // Friction
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.item, 0, 0);
                ctx.restore();
            }
        }

        // Add magic trail on mouse move
        window.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.6) {
                particles.push(new Particle(e.clientX, e.clientY, false));
            }
        });

        // Add bouncy explosions anywhere you click
        function createExplosion(x, y, amount, isSuper = false) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, true, isSuper));
            }
        }

        window.addEventListener('click', (e) => {
            if (e.target.id !== 'btn') {
                createExplosion(e.clientX, e.clientY, 25);
            }
        });

        // Loop the magic
        function animate() {
            // Semi-transparent peach clear to create soft trails
            ctx.fillStyle = 'rgba(255, 236, 210, 0.3)';
            ctx.fillRect(0, 0, width, height);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
