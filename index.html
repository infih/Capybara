<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capybara Nature Dance</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* The Nature Background */
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.8);
        }

        /* Start Screen (To bypass browser autoplay restrictions) */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        button {
            padding: 15px 30px;
            font-size: 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #45a049;
        }

        /* Main Container for Capybaras (Hidden initially) */
        #capybara-scene {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Capybara Roaming Animations */
        .roam-container-1 {
            position: absolute;
            animation: roamLeftToRight 15s linear infinite;
        }

        .roam-container-2 {
            position: absolute;
            animation: roamRightToLeft 18s linear infinite;
        }

        /* Capybara Dancing Animation */
        .capybara {
            width: 150px; /* Adjust size as needed */
            height: auto;
            animation: dance 1s ease-in-out infinite;
        }

        /* Keyframes for Roaming */
        @keyframes roamLeftToRight {
            0% { top: 60%; left: -20%; transform: scaleX(1); }
            45% { top: 70%; left: 110%; transform: scaleX(1); }
            50% { top: 70%; left: 110%; transform: scaleX(-1); } /* Flip to walk back */
            95% { top: 60%; left: -20%; transform: scaleX(-1); }
            100% { top: 60%; left: -20%; transform: scaleX(1); }
        }

        @keyframes roamRightToLeft {
            0% { top: 75%; left: 110%; transform: scaleX(-1); }
            45% { top: 65%; left: -20%; transform: scaleX(-1); }
            50% { top: 65%; left: -20%; transform: scaleX(1); } /* Flip to walk back */
            95% { top: 75%; left: 110%; transform: scaleX(1); }
            100% { top: 75%; left: 110%; transform: scaleX(-1); }
        }

        /* Keyframes for Dancing (Bouncing and wiggling) */
        @keyframes dance {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(-15deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-30px) rotate(15deg); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button onclick="startExperience()">Let the Capybaras Dance!</button>
    </div>

    <div id="background"></div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="capybara-scene">
        <div class="roam-container-1">
            <img class="capybara" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Capybara_%28Hydrochoerus_hydrochaeris%29.jpg/320px-Capybara_%28Hydrochoerus_hydrochaeris%29.jpg" alt="Capybara 1" style="border-radius: 50%;"> 
        </div>

        <div class="roam-container-2">
            <img class="capybara" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Capybara_%28Hydrochoerus_hydrochaeris%29.jpg/320px-Capybara_%28Hydrochoerus_hydrochaeris%29.jpg" alt="Capybara 2" style="border-radius: 50%;">
        </div>
    </div>

    <script>
        function startExperience() {
            // Hide the start screen
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                // Show the scene
                document.getElementById('capybara-scene').style.display = 'block';
            }, 500);

            // Play the music
            const music = document.getElementById('bg-music');
            music.volume = 0.5; // Set volume to 50%
            music.play();
        }
    </script>
</body>
</html>
