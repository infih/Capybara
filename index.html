<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Endless Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: #0f0c29; /* Fallback */
            background: linear-gradient(135deg, #240b36, #c31432);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Required for the 3D card tilt */
        }

        /* Canvas for High-Performance Particles */
        #magicCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Lets clicks pass through to the card */
        }

        /* Interactive 3D Glass Card */
        .card-container {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 4rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.1);
            color: #fff;
            max-width: 500px;
            transform: translateZ(50px); /* Pops the card out in 3D space */
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#ff9a9e, #fecfef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(255, 20, 80, 0.5);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* Interactive Button */
        .magic-btn {
            background: linear-gradient(45deg, #ff0844, #ffb199);
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 8, 68, 0.3);
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .magic-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 8, 68, 0.5);
        }

        .magic-btn:active {
            transform: translateY(2px);
        }

        /* Hidden Love Letter */
        .hidden-message {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0;
            font-style: italic;
            color: #ffd1d1;
        }

        .hidden-message.reveal {
            max-height: 200px;
            opacity: 1;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <canvas id="magicCanvas"></canvas>

    <div class="card-container" id="cardContainer">
        <div class="glass-card">
            <h1>My Universe</h1>
            <p>Every time you smile, a new star lights up in my sky. Move your cursor to see the magic you bring into my world.</p>
            <button class="magic-btn" id="revealBtn">Touch My Heart</button>
            <div class="hidden-message" id="secretMessage">
                "You are the most beautiful thing I keep inside my heart. I love you more than words can say, and more than actions can show. Forever and always." ❤️
            </div>
        </div>
    </div>

    <script>
        /* --- 1. 3D Card Tilt Effect --- */
        const container = document.getElementById('cardContainer');
        
        document.addEventListener('mousemove', (e) => {
            // Calculate mouse position relative to the center of the screen
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            
            // Apply 3D rotation based on mouse coordinates
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset card position when mouse leaves the window
        document.addEventListener('mouseleave', () => {
            container.style.transform = `rotateY(0deg) rotateX(0deg)`;
            container.style.transition = 'transform 0.5s ease';
        });
        document.addEventListener('mouseenter', () => {
            container.style.transition = 'transform 0.1s ease-out';
        });

        /* --- 2. Hidden Message Reveal --- */
        const revealBtn = document.getElementById('revealBtn');
        const secretMessage = document.getElementById('secretMessage');

        revealBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents the canvas click event from taking over entirely
            secretMessage.classList.toggle('reveal');
            if(secretMessage.classList.contains('reveal')) {
                revealBtn.innerText = "I Love You";
                createExplosion(window.innerWidth / 2, window.innerHeight / 2, 100); // Big center explosion
            } else {
                revealBtn.innerText = "Touch My Heart";
            }
        });

        /* --- 3. High-Performance Canvas Particles (Fixes Lag) --- */
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // Emojis for the particle engine
        const emojis = ['❤️', '💖', '✨', '💕', '🌸', '🦋'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particle Class
        class Particle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.size = Math.random() * 20 + 15; // Random size
                
                if (isExplosion) {
                    // Explosive outward movement
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 15 + 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.2; // They fall down eventually
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.01;
                } else {
                    // Gentle floating trail
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2 - 1; // Drift upward slightly
                    this.gravity = -0.05; // Float up
                    this.life = 1;
                    this.decay = Math.random() * 0.03 + 0.02;
                }
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 10;
            }

            update() {
                this.x += this.vx;
                this.vy += this.gravity;
                this.y += this.vy;
                this.life -= this.decay;
                this.rotation += this.rotSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = Math.max(0, this.life); // Fade out smoothly
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // Create particles on mouse move (Trail)
        window.addEventListener('mousemove', (e) => {
            // Only add occasionally to keep it elegant
            if (Math.random() > 0.5) {
                particles.push(new Particle(e.clientX, e.clientY, false));
            }
        });

        // Create particles on click (Explosion)
        function createExplosion(x, y, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, true));
            }
        }

        window.addEventListener('click', (e) => {
            // Don't trigger explosion if clicking the button (handled separately)
            if (e.target.id !== 'revealBtn') {
                createExplosion(e.clientX, e.clientY, 30);
            }
        });

        // Touch support for mobile
        window.addEventListener('touchmove', (e) => {
            if (Math.random() > 0.3) {
                particles.push(new Particle(e.touches[0].clientX, e.touches[0].clientY, false));
            }
        });

        // Animation Loop
        function animate() {
            // Clear canvas with a slight transparent black to create a motion blur effect
            ctx.clearRect(0, 0, width, height);

            // Update and draw all particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                // Remove dead particles to prevent memory leaks/lag
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate(); // Start the magic loop!
    </script>
</body>
</html>
