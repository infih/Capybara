<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Capybara Dance Party</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling */
            font-family: 'Open Sans', Arial, sans-serif;
            cursor: pointer; /* Encourage clicking to start */
        }

        /* The Anime Jungle Background */
        .scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Direct link to an anime jungle stock illustration */
            background-image: url('https://w0.peakpx.com/wallpaper/448/577/HD-wallpaper-rainforest-canopy-anime.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Click to Start Overlay */
        #play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        /* Capybara Wrapper for Position and Roaming */
        .capybara-wrapper {
            position: absolute;
            width: 250px; /* Size for anime character */
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 50px;
        }

        /* The Capybara Image itself */
        .capybara-anime {
            width: 100%;
            height: auto;
            /* Using a direct link for an anime style capybara image. 
               This image should have a transparent background. */
            content: url('https://thumbs.dreamstime.com/b/cartoon-capybara-illustration-anime-style-very-cute-small-kawaii-character-design-animal-mascot-icon-happy-cheerful-isolated-253702581.jpg');
            display: block;
        }

        /* CSS Animations: The Maraca Shake and Hip Sway */
        
        /* 1. Swaying Dance (similar to video) */
        @keyframes sway-dance {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            12.5% { transform: rotate(-8deg) translateX(-15px) translateY(-5px); }
            25% { transform: rotate(0deg) translateX(0); }
            37.5% { transform: rotate(8deg) translateX(15px) translateY(-5px); }
            50% { transform: rotate(0deg) translateX(0); }
            62.5% { transform: rotate(-8deg) translateX(-15px) translateY(-5px); }
            75% { transform: rotate(0deg) translateX(0); }
            87.5% { transform: rotate(8deg) translateX(15px) translateY(-5px); }
        }

        /* 2. Slow, continuous roaming */
        @keyframes roam-slow {
            0%, 100% { left: 20%; top: 60%; }
            25% { left: 15%; top: 55%; }
            50% { left: 25%; top: 65%; }
            75% { left: 30%; top: 58%; }
        }
        
        @keyframes roam2-slow {
            0%, 100% { right: 20%; top: 65%; }
            25% { right: 25%; top: 70%; }
            50% { right: 15%; top: 60%; }
            75% { right: 10%; top: 63%; }
        }

        /* Specific animations for Capybara 1 (Left) */
        .c1 {
            bottom: 100px;
            left: 20%;
            animation: sway-dance 4s infinite ease-in-out, roam-slow 20s infinite ease-in-out;
            animation-delay: 0s, 0s;
        }

        /* Specific animations for Capybara 2 (Right) */
        .c2 {
            bottom: 100px;
            right: 20%;
            animation: sway-dance 4s infinite ease-in-out reverse, roam2-slow 23s infinite ease-in-out;
            animation-delay: 0.5s, 0s;
        }

    </style>
</head>
<body onclick="playMusicAndShow()">

    <!-- Play Overlay -->
    <div id="play-overlay">
        <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">Click Anywhere to Start the Party!</h1>
    </div>

    <!-- The Entire Anime Scene -->
    <div class="scene-container">
        
        <!-- Anime Jungle Background Layer (part of scene-container) -->
        
        <!-- Capybara 1 (Left) -->
        <div class="capybara-wrapper c1">
            <img class="capybara-anime" src="" alt="Anime Capybara 1 with Maracas">
        </div>
        
        <!-- Capybara 2 (Right) -->
        <div class="capybara-wrapper c2">
            <img class="capybara-anime" src="" alt="Anime Capybara 2 with Maracas">
        </div>

    </div>

    <!-- Background Music -->
    <!-- SoundHelix track - Using a track with acoustic pop and Latin vibe similar to the style requested -->
    <audio id="background-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        function playMusicAndShow() {
            var audio = document.getElementById("background-music");
            audio.play();
            var overlay = document.getElementById("play-overlay");
            overlay.style.opacity = "0";
            setTimeout(function(){
                overlay.style.display = "none";
            }, 500); // Small delay to match transition
        }
    </script>

</body>
</html>
