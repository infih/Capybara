<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For the Lovely Prapti 🍑</title>
    <!-- Importing cute and elegant fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
        }

        body, html {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            /* Gorgeous Animated Peach Gradient */
            background: linear-gradient(-45deg, #ffc3a0, #ffafbd, #ffc3a0, #ffecd2);
            background-size: 400% 400%;
            animation: peachyBreeze 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        @keyframes peachyBreeze {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* High-Performance Canvas for Interactivity */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Lets clicks pass through to the card */
        }

        /* 3D Floating Glass Card */
        .card-container {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            animation: float 4s ease-in-out infinite;
            width: 90%;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .cute-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 120, 120, 0.2), 
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            color: #d65a7b;
            transform: translateZ(50px);
            transition: transform 0.15s ease-out;
            width: 100%;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 4.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 10px rgba(255, 117, 140, 0.3);
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 600;
            color: #b05c6f;
        }

        /* Interactive Cute Button */
        .magic-btn {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .magic-btn:active {
            transform: translateY(4px) scale(0.95);
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.5);
        }

        /* Hidden Cute Message */
        .secret-message {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s ease-in-out;
            font-size: 1.15rem;
            font-weight: 800;
            color: #ff6b81;
            margin-top: 0;
        }

        .secret-message.reveal {
            max-height: 250px;
            opacity: 1;
            margin-top: 20px;
        }

        /* Mobile Adjustments */
        @media (max-width: 450px) {
            h1 { font-size: 3.5rem; }
            .cute-card { padding: 2rem 1.5rem; border-radius: 30px; }
            p { font-size: 1rem; }
            .magic-btn { padding: 12px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- The Interactive Physics Canvas -->
    <canvas id="canvas"></canvas>

    <!-- The Floating Card -->
    <div class="card-container" id="cardBox">
        <div class="cute-card" id="tiltCard">
            <h1>Prapti</h1>
            <p>You make the world as sweet and warm as a perfect peach. Tap or drag your finger for a surprise!</p>
            <button class="magic-btn" id="btn">Touch Here 🍑</button>
            <div class="secret-message" id="msg">
                You are absolutely beautiful inside and out, Prapti! Keep shining your lovely light everywhere you go. ✨💖
            </div>
        </div>
    </div>

    <script>
        // Helper function for Haptic Feedback (Vibration)
        function vibrate(pattern) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        /* --- 1. 3D Card Hover & Touch Tilt --- */
        const tiltCard = document.getElementById('tiltCard');
        
        function handleTilt(x, y) {
            let xAxis = (window.innerWidth / 2 - x) / 30;
            let yAxis = (window.innerHeight / 2 - y) / 30;
            tiltCard.style.transform = `translateZ(50px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        }

        // For Desktop
        document.addEventListener('mousemove', (e) => handleTilt(e.clientX, e.clientY));
        
        // For Mobile Dragging
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            handleTilt(touch.clientX, touch.clientY);
        }, { passive: true });

        // Reset tilt on release
        document.addEventListener('touchend', () => {
            tiltCard.style.transform = `translateZ(50px) rotateY(0deg) rotateX(0deg)`;
        });
        document.addEventListener('mouseleave', () => {
            tiltCard.style.transform = `translateZ(50px) rotateY(0deg) rotateX(0deg)`;
        });

        /* --- 2. Button Interaction --- */
        const btn = document.getElementById('btn');
        const msg = document.getElementById('msg');

        // Works for both clicks and mobile taps
        btn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            msg.classList.toggle('reveal');
            
            if (msg.classList.contains('reveal')) {
                btn.innerText = "So Beautiful! ✨";
                createExplosion(window.innerWidth / 2, window.innerHeight / 2, 80, true);
                vibrate([50, 100, 150]); // Fun haptic pattern for the big reveal!
            } else {
                btn.innerText = "Touch Here 🍑";
                vibrate(30);
            }
        });

        /* --- 3. Bouncy Canvas Physics Engine --- */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        const cuteItems = ['🍑', '💖', '✨', '🌸', '🎀', '⭐'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, isExplosion = false, isSuper = false) {
                this.x = x;
                this.y = y;
                this.item = cuteItems[Math.floor(Math.random() * cuteItems.length)];
                this.size = Math.random() * 20 + 15;
                
                if (isSuper) this.size *= 1.5; 
                
                if (isExplosion) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * (isSuper ? 20 : 12) + 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.6; // Pulls them down a bit faster for mobile
                    this.life = 1;
                    this.decay = Math.random() * 0.01 + 0.005;
                    this.bounciness = Math.random() * 0.4 + 0.4;
                } else {
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2 - 1;
                    this.gravity = -0.05;
                    this.life = 1;
                    this.decay = Math.random() * 0.05 + 0.02; // Fade a bit faster on trail
                    this.bounciness = 0;
                }
                
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 15;
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                this.life -= this.decay;

                if (this.y > height - this.size && this.bounciness > 0) {
                    this.y = height - this.size;
                    this.vy *= -this.bounciness;
                    this.vx *= 0.8;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.item, 0, 0);
                ctx.restore();
            }
        }

        function createExplosion(x, y, amount, isSuper = false) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, true, isSuper));
            }
        }

        // Add trail on mouse move (Desktop)
        window.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.6) {
                particles.push(new Particle(e.clientX, e.clientY, false));
            }
        });

        // Add trail on finger drag (Mobile) - handles multiple fingers!
        window.addEventListener('touchmove', (e) => {
            for(let i = 0; i < e.touches.length; i++) {
                if (Math.random() > 0.4) {
                    particles.push(new Particle(e.touches[i].clientX, e.touches[i].clientY, false));
                }
            }
        }, { passive: true });

        // Explosions for clicks/taps on background
        const handleBackgroundTap = (x, y, target) => {
            if (target.id !== 'btn') {
                createExplosion(x, y, 20);
                vibrate(20); // Small haptic bump on tap
            }
        };

        window.addEventListener('click', (e) => handleBackgroundTap(e.clientX, e.clientY, e.target));
        
        // Specific touchstart for faster response on mobile
        window.addEventListener('touchstart', (e) => {
            for(let i = 0; i < e.changedTouches.length; i++) {
                handleBackgroundTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY, e.target);
            }
        }, { passive: true });

        // Loop the magic
        function animate() {
            ctx.fillStyle = 'rgba(255, 236, 210, 0.4)';
            ctx.fillRect(0, 0, width, height);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
